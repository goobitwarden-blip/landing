<!DOCTYPE html>
    <html lang="ru">
    <head>
        <meta charset="UTF-8">
  <title>Клон</title>
  <style>
    body {
    margin: 0;
    font-family: -apple-system, Arial, sans-serif;
  }
    .nav {
      display: flex;

      text-decoration: none;
      font-size: 18px;
      font-weight: 600;
    }
    .cta.small { padding: 10px 20px; font-size: 15px; }
    .hero {
        min-height: 100vh;
        display: flex;

        background: #0d1117;
        color: #ffffff;

    .hero p {
